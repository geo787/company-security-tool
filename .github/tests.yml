name: Security Scanner CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

      - name: Check no reports committed
        run: |
          count=$(find reports/ -name "*.txt" -o -name "*.csv" -o -name "*.json" 2>/dev/null | wc -l)
          if [ "$count" -gt "0" ]; then
            echo "WARNING: $count report file(s) found in repo"
          else
            echo "OK: No scan reports committed"
          fi